<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KorSolutions - Супер-Адмінка</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f1f5f9; color: #1e293b; padding: 20px; margin: 0; }
        .admin-container { max-width: 950px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { font-size: 1.8rem; margin-bottom: 25px; text-align: center; color: #0f172a; }
        h1 i { color: #3b82f6; }
        #authBlock { display: block; max-width: 400px; margin: 50px auto; }
        #managerBlock { display: none; }
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .tab-btn { background: none; border: none; padding: 10px 20px; font-size: 1.1rem; font-weight: 600; color: #64748b; cursor: pointer; border-radius: 8px; transition: 0.2s; }
        .tab-btn.active { background: #3b82f6; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .input-group { position: relative; margin-bottom: 15px; }
        .input-group i { position: absolute; left: 15px; top: 16px; color: #94a3b8; }
        .input-group input, .input-group select { width: 100%; padding: 14px 14px 14px 45px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 1rem; outline: none; font-family: inherit; box-sizing: border-box; }
        
        .quick-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 15px; margin-top: -10px; padding-left: 5px; }
        .quick-tag { background: #e2e8f0; color: #475569; font-size: 0.8rem; font-weight: 600; padding: 4px 8px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .quick-tag:hover { background: #cbd5e1; color: #1e293b; }

        .btn-action { width: 100%; background: #10b981; color: white; border: none; padding: 14px; border-radius: 8px; font-size: 1.1rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: 0.2s; }
        .btn-action:hover { background: #059669; }
        
        .job-list-item { border: 1px solid #e2e8f0; padding: 15px; margin-bottom: -1px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; background: white; transition: 0.2s; }
        .job-list-item:first-child { border-top-left-radius: 8px; border-top-right-radius: 8px; }
        .job-list-item:last-child { border-bottom-left-radius: 8px; border-bottom-right-radius: 8px; margin-bottom: 15px; }
        .job-list-item:hover { background: #f8fafc; z-index: 1; position: relative; }
        
        .job-info { flex-grow: 1; }
        .job-info h3 { margin: 0 0 5px 0; color: #0f172a; font-size: 1.1rem; display: flex; align-items: center; gap: 10px; }
        .job-info p { margin: 0; color: #64748b; font-size: 0.9rem; }
        .job-actions { display: flex; gap: 8px; }
        .btn-edit { background: #3b82f6; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .btn-clone { background: #3b82f6; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .btn-delete { background: #ef4444; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .btn-cancel { background: #94a3b8; color: white; border: none; padding: 14px; border-radius: 8px; font-size: 1.1rem; font-weight: 600; cursor: pointer; width: 100%; margin-top: 10px; display: none; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #64748b; text-decoration: none; font-size: 0.9rem; }
        .status-pill { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; margin-bottom: 5px;}
        .pill-active { background: #dcfce7; color: #166534; }
        .pill-inactive { background: #fee2e2; color: #991b1b; }

        .ql-toolbar.ql-snow { display: block !important; border: 1px solid #cbd5e1; border-top-left-radius: 8px; border-top-right-radius: 8px; background: #f8fafc; }
        .ql-container.ql-snow { border: 1px solid #cbd5e1 !important; border-top: none !important; border-bottom-left-radius: 8px; border-bottom-right-radius: 8px; font-family: 'Montserrat', sans-serif; font-size: 1rem; }
        
        .admin-pagination button { min-width: 40px; height: 40px; padding: 0 6px; border-radius: 8px; border: 1px solid #cbd5e1; background: white; color: #334155; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .admin-pagination button:hover:not(:disabled) { background: #f1f5f9; }
        .admin-pagination button:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Швидкі фільтри */
        .quick-filters { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .qf-btn { background: white; border: 1px solid #cbd5e1; color: #475569; padding: 8px 16px; border-radius: 20px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .qf-btn:hover { background: #f1f5f9; }
        .qf-btn.active { background: #0f172a; color: white; border-color: #0f172a; }

        /* Масові дії */
        .bulk-actions { display: flex; gap: 15px; align-items: center; background: #f8fafc; padding: 12px 20px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 20px; flex-wrap: wrap; }
        .bulk-actions input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: #3b82f6; }
        .btn-bulk { padding: 8px 15px; border-radius: 6px; border: none; color: white; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 0.9rem; transition: 0.2s; }
        .btn-bulk-archive { background: #f59e0b; } .btn-bulk-archive:hover { background: #d97706; }
        .btn-bulk-delete { background: #ef4444; } .btn-bulk-delete:hover { background: #dc2626; }

        .analytics-stats { font-size: 0.85rem; color: #64748b; margin-top: 8px; display: flex; gap: 15px; font-weight: 600; }
        .analytics-stats i { color: #94a3b8; }
    </style>
</head>
<body>

    <div class="admin-container">
        <div id="authBlock">
            <h1><i class="fas fa-lock"></i> Вхід в адмін-панель</h1>
            <div class="input-group">
                <i class="fas fa-key"></i>
                <input type="password" id="adminPassword" placeholder="Введіть пароль (admin123)">
            </div>
            <button class="btn-action" style="background:#3b82f6;" onclick="checkPassword()">Увійти</button>
            <a href="index.html" class="back-link">Повернутися на сайт</a>
        </div>

        <div id="managerBlock">
            <h1><i class="fas fa-tools"></i> Панель керування</h1>
            
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('list')"><i class="fas fa-list"></i> Всі вакансії</button>
                <button class="tab-btn" onclick="switchTab('add')" id="tabAddBtn"><i class="fas fa-plus"></i> Додати вакансію</button>
            </div>

            <div id="tab-list" class="tab-content active">
                
                <div class="quick-filters">
                    <button class="qf-btn active" onclick="setAdminFilter('all', this)">Всі (<span id="cntAll">0</span>)</button>
                    <button class="qf-btn" onclick="setAdminFilter('active', this)">Актуальні (<span id="cntActive">0</span>)</button>
                    <button class="qf-btn" onclick="setAdminFilter('archive', this)">Архівні (<span id="cntArchive">0</span>)</button>
                </div>

                <div style="display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap;">
                    <div class="input-group" style="flex-grow: 1; margin-bottom: 0;">
                        <i class="fas fa-search"></i>
                        <input type="text" id="adminSearch" placeholder="Шукати за назвою, країною або кодом..." oninput="applyAdminFilters()">
                    </div>
                    <div class="input-group" style="width: 200px; margin-bottom: 0;">
                        <i class="fas fa-list-ol"></i>
                        <select id="adminPerPage" onchange="applyAdminFilters()">
                            <option value="10">10 на сторінці</option>
                            <option value="20">20 на сторінці</option>
                            <option value="50">50 на сторінці</option>
                        </select>
                    </div>
                </div>

                <div class="bulk-actions">
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <input type="checkbox" id="selectAllCb" onclick="toggleSelectAll(this)">
                        <label for="selectAllCb" style="font-weight: 600; cursor: pointer; color: #334155;">Вибрати всі на сторінці</label>
                    </div>
                    <div style="display: flex; gap: 10px; margin-left: auto; flex-wrap: wrap;">
                        <button class="btn-bulk btn-bulk-archive" onclick="bulkAction('archive')"><i class="fas fa-archive"></i> В архів</button>
                        <button class="btn-bulk btn-bulk-delete" onclick="bulkAction('delete')"><i class="fas fa-trash"></i> Видалити</button>
                    </div>
                </div>

                <div id="adminJobsList"><p style="text-align:center;"><i class="fas fa-spinner fa-spin"></i> Завантаження...</p></div>
                <div id="adminPagination" class="admin-pagination" style="display: flex; justify-content: center; gap: 8px; margin-top: 20px;"></div>
            </div>

            <div id="tab-add" class="tab-content">
                <h2 id="formTitle" style="margin-bottom:20px; font-size:1.3rem;">Створення нової вакансії</h2>
                <form id="jobForm" onsubmit="saveJob(event)">
                    
                    <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                        <div class="input-group" style="flex-grow: 1;">
                            <i class="fas fa-info-circle"></i>
                            <select id="jobStatus" required>
                                <option value="Актуальна">Статус: Актуальна</option>
                                <option value="Неактуальна">Статус: Неактуальна (Архів)</option>
                            </select>
                        </div>
                        <div class="input-group" style="flex-grow: 1;">
                            <i class="fas fa-calendar-times"></i>
                            <input type="date" id="jobExpireDate" title="Дата закінчення (автоматично перейде в архів після цієї дати)">
                        </div>
                    </div>

                    <div class="input-group">
                        <i class="fas fa-user-secret" style="color: #e11d48;"></i>
                        <input type="text" id="jobPartner" placeholder="Код партнера (напр. ID-405) - Приховано!">
                    </div>

                    <div class="input-group">
                        <i class="fas fa-heading"></i>
                        <input type="text" id="jobTitle" placeholder="Назва вакансії" required>
                    </div>

                    <div class="input-group" style="margin-bottom: 5px;">
                        <i class="fas fa-globe"></i>
                        <input type="text" id="jobCountry" placeholder="Країна (через кому)" required>
                    </div>
                    <div id="quickCountries" class="quick-tags"></div>

                    <div class="input-group" style="margin-bottom: 5px;">
                        <i class="fas fa-city"></i>
                        <input type="text" id="jobBaseCity" placeholder="Головне місто (для фільтру)">
                    </div>
                    <div id="quickCities" class="quick-tags"></div>

                    <div class="input-group">
                        <i class="fas fa-route"></i>
                        <select id="jobRadius" required>
                            <option value="0">Точно в місті (0 км)</option>
                            <option value="10">Відстань до 10 км</option>
                            <option value="30">Відстань до 30 км</option>
                            <option value="50">Відстань до 50 км</option>
                            <option value="100">Відстань до 100 км</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <i class="fas fa-map-marker-alt"></i>
                        <input type="text" id="jobAddress" placeholder="Точна адреса (видима для кандидата)">
                    </div>

                    <div class="input-group" style="margin-bottom: 5px;">
                        <i class="fas fa-layer-group"></i>
                        <input type="text" id="jobCategory" placeholder="Сфера (через кому)" required>
                    </div>
                    <div id="quickCategories" class="quick-tags"></div>

                    <div class="input-group" style="margin-bottom: 5px;">
                        <i class="fas fa-user-clock"></i>
                        <input type="text" id="jobAge" placeholder="Вікові групи (напр: 18-45)">
                    </div>
                    <div id="quickAges" class="quick-tags"></div>
                    
                    <div class="input-group" style="display: flex; align-items: center; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; margin-bottom: 15px;">
                        <input type="checkbox" id="jobMinors" style="width: 20px; height: 20px; margin-right: 15px; cursor: pointer;">
                        <label for="jobMinors" style="font-size: 1rem; cursor: pointer; color: #475569; font-weight: 600;">Підходить для неповнолітніх (до 18)</label>
                    </div>

                    <div class="input-group" style="padding: 10px 15px; border: 1px solid #cbd5e1; border-radius: 8px; margin-bottom: 15px;">
                        <div style="color: #64748b; margin-bottom: 8px; font-weight: 600;"><i class="fas fa-venus-mars"></i> Стать (можна кілька):</div>
                        <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                            <label><input type="checkbox" class="admin-gender-cb" value="Чоловіки"> Чоловіки</label>
                            <label><input type="checkbox" class="admin-gender-cb" value="Жінки"> Жінки</label>
                            <label><input type="checkbox" class="admin-gender-cb" value="Сімейні пари"> Сімейні пари</label>
                        </div>
                    </div>

                    <div class="input-group">
                        <i class="fas fa-money-bill-wave"></i>
                        <input type="text" id="jobSalary" placeholder="Зарплата (напр. від 1900€/міс)" required>
                    </div>

                    <div class="input-group">
                        <i class="fas fa-image"></i>
                        <input type="url" id="jobImage" placeholder="Посилання на головне фото (URL) - необов'язково">
                    </div>
                    
                    <div style="margin-bottom: 20px;">
                        <div style="color: #64748b; font-weight: 600; margin-bottom: 5px; padding-left: 5px;">Опис вакансії (Можна вставляти фото/відео!):</div>
                        <div id="editor-container" style="height: 350px; background: white;"></div>
                    </div>
                    
                    <button type="submit" id="submitBtn" class="btn-action">Зберегти вакансію <i class="fas fa-save"></i></button>
                    <button type="button" id="cancelEditBtn" class="btn-cancel" onclick="cancelEdit()">Скасувати</button>
                </form>
            </div>
            <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Повернутися на сайт</a>
        </div>
    </div>

    <script>
        const SecretPassword = 'admin123'; 
        const dbBase = 'https://korsolutions-jobs-default-rtdb.europe-west1.firebasedatabase.app/jobs'; 
        
        let allJobs = {}; 
        let adminJobsArray = [];
        let filteredAdminJobs = [];
        let adminCurrentPage = 1;
        let editingJobId = null; 
        let currentFilter = 'all';

        var quill = new Quill('#editor-container', {
            theme: 'snow',
            placeholder: 'Опишіть вакансію, додайте фотографії або відео...',
            modules: { toolbar: [ ['bold', 'italic', 'underline', 'link'], [{ 'list': 'ordered'}, { 'list': 'bullet' }], ['image', 'video'], ['clean'] ] }
        });

        function checkPassword() {
            if (document.getElementById('adminPassword').value === SecretPassword) {
                document.getElementById('authBlock').style.display = 'none';
                document.getElementById('managerBlock').style.display = 'block';
                loadAdminJobs();
            } else { alert('Невірний пароль!'); }
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tabName}`).classList.add('active');
            if(tabName === 'list') { document.querySelector('.tab-btn:nth-child(1)').classList.add('active'); } 
            else { document.getElementById('tabAddBtn').classList.add('active'); }
        }

        function addQuickTag(inputId, val) {
            const input = document.getElementById(inputId);
            let current = input.value.split(',').map(s => s.trim()).filter(Boolean);
            if(!current.includes(val)) { current.push(val); input.value = current.join(', '); }
        }

        function loadAdminJobs() {
            fetch(dbBase + '.json').then(res => res.json()).then(data => {
                if(data) {
                    allJobs = data;
                    adminJobsArray = Object.entries(data).map(([id, job]) => ({ id, ...job }));
                    adminJobsArray.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
                    
                    const countries = [...new Set(adminJobsArray.flatMap(j => j.country ? j.country.split(',').map(s=>s.trim()) : []))].filter(Boolean);
                    const categories = [...new Set(adminJobsArray.flatMap(j => j.category ? j.category.split(',').map(s=>s.trim()) : []))].filter(Boolean);
                    const ages = [...new Set(adminJobsArray.flatMap(j => j.age ? j.age.split(',').map(s=>s.trim()) : []))].filter(Boolean);
                    const cities = [...new Set(adminJobsArray.flatMap(j => j.baseCity ? j.baseCity.split(',').map(s=>s.trim()) : []))].filter(Boolean);

                    document.getElementById('quickCountries').innerHTML = countries.map(c => `<span class="quick-tag" onclick="addQuickTag('jobCountry', '${c}')">+ ${c}</span>`).join('');
                    document.getElementById('quickCategories').innerHTML = categories.map(c => `<span class="quick-tag" onclick="addQuickTag('jobCategory', '${c}')">+ ${c}</span>`).join('');
                    document.getElementById('quickAges').innerHTML = ages.map(c => `<span class="quick-tag" onclick="addQuickTag('jobAge', '${c}')">+ ${c}</span>`).join('');
                    document.getElementById('quickCities').innerHTML = cities.map(c => `<span class="quick-tag" onclick="addQuickTag('jobBaseCity', '${c}')">+ ${c}</span>`).join('');
                } else {
                    allJobs = {};
                    adminJobsArray = [];
                }
                updateFilterCounts();
                applyAdminFilters();
            });
        }

        function setAdminFilter(filterType, btnElement) {
            currentFilter = filterType;
            document.querySelectorAll('.qf-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            applyAdminFilters();
        }

        function getActualStatus(job) {
            const d = new Date();
            const today = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
            let status = job.status || 'Актуальна';
            if (job.expireDate && job.expireDate < today) status = 'Неактуальна';
            return status;
        }

        function updateFilterCounts() {
            document.getElementById('cntAll').innerText = adminJobsArray.length;
            document.getElementById('cntActive').innerText = adminJobsArray.filter(j => getActualStatus(j) === 'Актуальна').length;
            document.getElementById('cntArchive').innerText = adminJobsArray.filter(j => getActualStatus(j) !== 'Актуальна').length;
        }

        function applyAdminFilters() {
            const query = document.getElementById('adminSearch').value.toLowerCase();
            document.getElementById('selectAllCb').checked = false; // скидаємо чекбокс масових дій

            filteredAdminJobs = adminJobsArray.filter(job => {
                const matchSearch = job.title.toLowerCase().includes(query) || (job.partner && job.partner.toLowerCase().includes(query)) || (job.country && job.country.toLowerCase().includes(query));
                
                const status = getActualStatus(job);
                let matchStatus = true;
                if (currentFilter === 'active') matchStatus = status === 'Актуальна';
                if (currentFilter === 'archive') matchStatus = status !== 'Актуальна';

                return matchSearch && matchStatus;
            });
            adminCurrentPage = 1;
            renderAdminJobs();
        }

        function renderAdminJobs() {
            const list = document.getElementById('adminJobsList');
            list.innerHTML = '';
            const perPage = parseInt(document.getElementById('adminPerPage').value);
            
            const start = (adminCurrentPage - 1) * perPage;
            const end = start + perPage;
            const jobsToShow = filteredAdminJobs.slice(start, end);

            if(jobsToShow.length === 0) {
                list.innerHTML = '<p style="text-align:center; color:#64748b;">Немає знайдених вакансій.</p>';
                document.getElementById('adminPagination').innerHTML = '';
                return;
            }

            jobsToShow.forEach(job => {
                const jobStatus = getActualStatus(job);
                const badgeClass = jobStatus === 'Актуальна' ? 'pill-active' : 'pill-inactive';
                const views = job.views || 0;
                const applies = job.applies || 0;
                
                list.innerHTML += `
                    <div class="job-list-item">
                        <input type="checkbox" class="job-checkbox" value="${job.id}" style="width:18px; height:18px; accent-color:#3b82f6; cursor:pointer;">
                        
                        <div class="job-info">
                            <div class="status-pill ${badgeClass}">${jobStatus}</div>
                            <h3>${job.title} ${job.image ? '<i class="fas fa-image" style="color:#94a3b8; font-size:1rem;" title="Є обкладинка"></i>' : ''}</h3>
                            <p>${job.country} | ${job.category}</p>
                            ${job.partner ? `<p style="color:#e11d48; font-size:0.85rem; margin-top:2px;"><i class="fas fa-user-secret"></i> Партнер: ${job.partner}</p>` : ''}
                            
                            <div class="analytics-stats">
                                <span title="Кількість розгортань опису"><i class="fas fa-eye"></i> Переглядів: ${views}</span>
                                <span title="Кількість кліків 'Відгукнутися'"><i class="fas fa-paper-plane"></i> Відгуків: ${applies}</span>
                            </div>
                        </div>
                        
                        <div class="job-actions">
                            <button class="btn-clone" onclick="cloneJob('${job.id}')" title="Дублювати"><i class="fas fa-copy"></i></button>
                            <button class="btn-edit" onclick="editJob('${job.id}')" title="Редагувати"><i class="fas fa-pen"></i></button>
                            <button class="btn-delete" onclick="deleteJob('${job.id}')" title="Видалити"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
            });
            renderAdminPagination();
        }

        // Масові дії
        function toggleSelectAll(checkbox) {
            document.querySelectorAll('.job-checkbox').forEach(cb => cb.checked = checkbox.checked);
        }

        function bulkAction(actionType) {
            const selected = Array.from(document.querySelectorAll('.job-checkbox:checked')).map(cb => cb.value);
            if (selected.length === 0) return alert('Спочатку виділіть вакансії галочками!');
            
            const actionText = actionType === 'archive' ? 'перенести в архів' : 'НАЗАВЖДИ видалити';
            if (!confirm(`Ви впевнені, що хочете ${actionText} ${selected.length} вакансій?`)) return;

            // Збираємо оновлення для Firebase (один запит замість багатьох)
            const updates = {};
            selected.forEach(id => {
                if (actionType === 'archive') updates[`${id}/status`] = 'Неактуальна';
                if (actionType === 'delete') updates[id] = null;
            });

            fetch(dbBase + '.json', {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(updates)
            }).then(() => {
                document.getElementById('selectAllCb').checked = false;
                loadAdminJobs();
            });
        }

        function renderAdminPagination() {
            const perPage = parseInt(document.getElementById('adminPerPage').value);
            const totalPages = Math.ceil(filteredAdminJobs.length / perPage);
            const pagDiv = document.getElementById('adminPagination');
            pagDiv.innerHTML = '';
            if (totalPages <= 1) return;

            pagDiv.innerHTML += `<button style="background: ${adminCurrentPage === 1 ? '#f1f5f9' : 'white'};" onclick="changeAdminPage(${adminCurrentPage - 1})" ${adminCurrentPage === 1 ? 'disabled' : ''}><i class="fas fa-chevron-left"></i></button>`;
            for (let i = 1; i <= totalPages; i++) {
                const activeStyle = i === adminCurrentPage ? 'background:#3b82f6; color:white; border-color:#3b82f6;' : 'background:white;';
                pagDiv.innerHTML += `<button style="${activeStyle}" onclick="changeAdminPage(${i})">${i}</button>`;
            }
            pagDiv.innerHTML += `<button style="background: ${adminCurrentPage === totalPages ? '#f1f5f9' : 'white'};" onclick="changeAdminPage(${adminCurrentPage + 1})" ${adminCurrentPage === totalPages ? 'disabled' : ''}><i class="fas fa-chevron-right"></i></button>`;
        }

        function changeAdminPage(page) {
            const perPage = parseInt(document.getElementById('adminPerPage').value);
            const totalPages = Math.ceil(filteredAdminJobs.length / perPage);
            if(page < 1 || page > totalPages) return;
            adminCurrentPage = page;
            document.getElementById('selectAllCb').checked = false;
            renderAdminJobs();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function saveJob(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = 'Збереження...';
            btn.disabled = true;

            const selectedGenders = Array.from(document.querySelectorAll('.admin-gender-cb:checked')).map(cb => cb.value).join(', ');

            // Зберігаємо стару аналітику, якщо вона була
            const oldViews = (editingJobId && allJobs[editingJobId]) ? (allJobs[editingJobId].views || 0) : 0;
            const oldApplies = (editingJobId && allJobs[editingJobId]) ? (allJobs[editingJobId].applies || 0) : 0;

            const jobData = {
                status: document.getElementById('jobStatus').value,
                expireDate: document.getElementById('jobExpireDate').value,
                partner: document.getElementById('jobPartner').value, 
                title: document.getElementById('jobTitle').value,
                country: document.getElementById('jobCountry').value,
                baseCity: document.getElementById('jobBaseCity').value, 
                radius: document.getElementById('jobRadius').value,     
                address: document.getElementById('jobAddress').value, 
                category: document.getElementById('jobCategory').value,
                age: document.getElementById('jobAge').value,
                minors: document.getElementById('jobMinors').checked ? 'Так' : 'Ні',
                gender: selectedGenders, 
                salary: document.getElementById('jobSalary').value,
                image: document.getElementById('jobImage').value, 
                desc: quill.root.innerHTML, 
                views: oldViews,
                applies: oldApplies,
                timestamp: (editingJobId && allJobs[editingJobId] && allJobs[editingJobId].timestamp) ? allJobs[editingJobId].timestamp : Date.now()
            };

            const url = editingJobId ? `${dbBase}/${editingJobId}.json` : `${dbBase}.json`;
            const method = editingJobId ? 'PUT' : 'POST';

            fetch(url, { method: method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(jobData) })
            .then(response => {
                if(response.ok) { alert('✅ Успішно збережено!'); cancelEdit(); loadAdminJobs(); switchTab('list'); }
            }).finally(() => { btn.innerHTML = 'Зберегти вакансію <i class="fas fa-save"></i>'; btn.disabled = false; });
        }

        function editJob(id) {
            editingJobId = id;
            fillFormFromJob(allJobs[id]);
            document.getElementById('formTitle').innerText = 'Редагування вакансії';
            document.getElementById('tabAddBtn').innerHTML = '<i class="fas fa-pen"></i> Редагування';
            document.getElementById('cancelEditBtn').style.display = 'block';
            switchTab('add');
        }

        function cloneJob(id) {
            editingJobId = null; 
            fillFormFromJob(allJobs[id]);
            document.getElementById('jobTitle').value = allJobs[id].title + ' (Копія)'; 
            document.getElementById('formTitle').innerText = 'Створення копії вакансії';
            document.getElementById('tabAddBtn').innerHTML = '<i class="fas fa-copy"></i> Копіювання';
            document.getElementById('cancelEditBtn').style.display = 'block';
            switchTab('add');
        }

        function fillFormFromJob(job) {
            document.getElementById('jobStatus').value = job.status || 'Актуальна';
            document.getElementById('jobExpireDate').value = job.expireDate || '';
            document.getElementById('jobPartner').value = job.partner || '';
            document.getElementById('jobTitle').value = job.title;
            document.getElementById('jobCountry').value = job.country;
            document.getElementById('jobBaseCity').value = job.baseCity || ''; 
            document.getElementById('jobRadius').value = job.radius || '0';    
            document.getElementById('jobAddress').value = job.address || '';
            document.getElementById('jobCategory').value = job.category;
            document.getElementById('jobAge').value = job.age || '';
            document.getElementById('jobMinors').checked = job.minors === 'Так';
            document.getElementById('jobImage').value = job.image || '';
            
            const genders = job.gender ? job.gender.split(',').map(s=>s.trim()) : [];
            document.querySelectorAll('.admin-gender-cb').forEach(cb => { cb.checked = genders.includes(cb.value); });

            document.getElementById('jobSalary').value = job.salary;
            quill.root.innerHTML = job.desc;
        }

        function cancelEdit() {
            editingJobId = null;
            document.getElementById('jobForm').reset();
            document.querySelectorAll('.admin-gender-cb').forEach(cb => cb.checked = false);
            quill.root.innerHTML = ''; 
            document.getElementById('jobStatus').value = 'Актуальна';
            document.getElementById('jobRadius').value = '0';
            document.getElementById('jobImage').value = '';
            document.getElementById('formTitle').innerText = 'Створення нової вакансії';
            document.getElementById('tabAddBtn').innerHTML = '<i class="fas fa-plus"></i> Додати вакансію';
            document.getElementById('cancelEditBtn').style.display = 'none';
        }

        function deleteJob(id) {
            if(confirm('Видалити назавжди?')) {
                fetch(`${dbBase}/${id}.json`, { method: 'DELETE' }).then(res => { if(res.ok) loadAdminJobs(); });
            }
        }
    </script>
</body>
</html>
