<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KorSolutions - Супер-Адмінка</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f1f5f9; color: #1e293b; padding: 20px; margin: 0; }
        .admin-container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { font-size: 1.8rem; margin-bottom: 25px; text-align: center; color: #0f172a; }
        h1 i { color: #3b82f6; }
        #authBlock { display: block; max-width: 400px; margin: 50px auto; }
        #managerBlock { display: none; }
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .tab-btn { background: none; border: none; padding: 10px 20px; font-size: 1.1rem; font-weight: 600; color: #64748b; cursor: pointer; border-radius: 8px; transition: 0.2s; }
        .tab-btn.active { background: #3b82f6; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .input-group { position: relative; margin-bottom: 15px; }
        .input-group i { position: absolute; left: 15px; top: 16px; color: #94a3b8; }
        .input-group input, .input-group select, .input-group textarea { width: 100%; padding: 14px 14px 14px 45px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 1rem; outline: none; font-family: inherit; box-sizing: border-box; }
        .input-group textarea { height: 120px; resize: vertical; }
        .btn-action { width: 100%; background: #10b981; color: white; border: none; padding: 14px; border-radius: 8px; font-size: 1.1rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: 0.2s; }
        .btn-action:hover { background: #059669; }
        .job-list-item { border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .job-info h3 { margin: 0 0 5px 0; color: #0f172a; font-size: 1.1rem; }
        .job-info p { margin: 0; color: #64748b; font-size: 0.9rem; }
        .job-actions { display: flex; gap: 10px; }
        .btn-edit { background: #3b82f6; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .btn-delete { background: #ef4444; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .btn-cancel { background: #94a3b8; color: white; border: none; padding: 14px; border-radius: 8px; font-size: 1.1rem; font-weight: 600; cursor: pointer; width: 100%; margin-top: 10px; display: none; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #64748b; text-decoration: none; font-size: 0.9rem; }
        .status-pill { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; margin-bottom: 5px;}
        .pill-active { background: #dcfce7; color: #166534; }
        .pill-inactive { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

    <div class="admin-container">
        <div id="authBlock">
            <h1><i class="fas fa-lock"></i> Вхід в адмін-панель</h1>
            <div class="input-group">
                <i class="fas fa-key"></i>
                <input type="password" id="adminPassword" placeholder="Введіть пароль">
            </div>
            <button class="btn-action" style="background:#3b82f6;" onclick="checkPassword()">Увійти</button>
            <a href="index.html" class="back-link">Повернутися на сайт</a>
        </div>

        <div id="managerBlock">
            <h1><i class="fas fa-tools"></i> Панель керування сайтом</h1>
            
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('list')"><i class="fas fa-list"></i> Всі вакансії</button>
                <button class="tab-btn" onclick="switchTab('add')" id="tabAddBtn"><i class="fas fa-plus"></i> Додати вакансію</button>
            </div>

            <div id="tab-list" class="tab-content active">
                <div id="adminJobsList"><p style="text-align:center;"><i class="fas fa-spinner fa-spin"></i> Завантаження...</p></div>
            </div>

            <div id="tab-add" class="tab-content">
                <h2 id="formTitle" style="margin-bottom:20px; font-size:1.3rem;">Створення нової вакансії</h2>
                <form id="jobForm" onsubmit="saveJob(event)">
                    
                    <div class="input-group">
                        <i class="fas fa-info-circle"></i>
                        <select id="jobStatus" required>
                            <option value="Актуальна">Статус: Актуальна (Відображається на сайті)</option>
                            <option value="Неактуальна">Статус: Неактуальна (В архіві)</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <i class="fas fa-heading"></i>
                        <input type="text" id="jobTitle" placeholder="Назва вакансії" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-globe"></i>
                        <input type="text" id="jobCountry" placeholder="Країна (напр: Німеччина, Польща)" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-layer-group"></i>
                        <input type="text" id="jobCategory" placeholder="Сфера (напр: Склади, Будівництво)" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-user-clock"></i>
                        <input type="text" id="jobAge" placeholder="Вікові групи (напр: 18-45, 45-60) - створить фільтр">
                    </div>
                    
                    <div class="input-group" style="display: flex; align-items: center; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; margin-bottom: 15px;">
                        <input type="checkbox" id="jobMinors" style="width: 20px; height: 20px; margin-right: 15px; cursor: pointer;">
                        <label for="jobMinors" style="font-size: 1rem; cursor: pointer; color: #475569; font-weight: 600;">Вакансія підходить для неповнолітніх (до 18 років)</label>
                    </div>

                    <div class="input-group">
                        <i class="fas fa-venus-mars"></i>
                        <select id="jobGender" required>
                            <option value="" disabled selected>Оберіть стать кандидата</option>
                            <option value="Чоловіки">Чоловіки</option>
                            <option value="Жінки">Жінки</option>
                            <option value="Сімейні пари">Сімейні пари</option>
                            <option value="Будь-яка">Будь-яка (Не вказувати)</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-money-bill-wave"></i>
                        <input type="text" id="jobSalary" placeholder="Зарплата (напр. від 1900€/міс)" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-align-left"></i>
                        <textarea id="jobDesc" placeholder="Опис умов роботи, обов'язків та проживання..." required></textarea>
                    </div>
                    
                    <button type="submit" id="submitBtn" class="btn-action">Зберегти вакансію <i class="fas fa-save"></i></button>
                    <button type="button" id="cancelEditBtn" class="btn-cancel" onclick="cancelEdit()">Скасувати редагування</button>
                </form>
            </div>
            <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Повернутися на сайт</a>
        </div>
    </div>

    <script>
        const SecretPassword = 'admin123'; 
        const dbBase = 'https://korsolutions-jobs-default-rtdb.europe-west1.firebasedatabase.app/jobs'; 
        let allJobs = {}; 
        let editingJobId = null; 

        function checkPassword() {
            if (document.getElementById('adminPassword').value === SecretPassword) {
                document.getElementById('authBlock').style.display = 'none';
                document.getElementById('managerBlock').style.display = 'block';
                loadAdminJobs();
            } else { alert('Невірний пароль!'); }
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tabName}`).classList.add('active');
            if(tabName === 'list') { document.querySelector('.tab-btn:nth-child(1)').classList.add('active'); } 
            else { document.getElementById('tabAddBtn').classList.add('active'); }
        }

        function loadAdminJobs() {
            fetch(dbBase + '.json').then(res => res.json()).then(data => {
                const list = document.getElementById('adminJobsList');
                list.innerHTML = '';
                if(data) {
                    allJobs = data;
                    // Сортуємо список в адмінці, щоб нові були зверху
                    const sortedKeys = Object.keys(data).sort((a, b) => (data[b].timestamp || 0) - (data[a].timestamp || 0));
                    
                    sortedKeys.forEach(id => {
                        const job = data[id];
                        const jobStatus = job.status || 'Актуальна';
                        const badgeClass = jobStatus === 'Актуальна' ? 'pill-active' : 'pill-inactive';
                        list.innerHTML += `
                            <div class="job-list-item">
                                <div class="job-info">
                                    <div class="status-pill ${badgeClass}">${jobStatus}</div>
                                    <h3>${job.title}</h3>
                                    <p>${job.country} | ${job.category}</p>
                                </div>
                                <div class="job-actions">
                                    <button class="btn-edit" onclick="editJob('${id}')"><i class="fas fa-pen"></i></button>
                                    <button class="btn-delete" onclick="deleteJob('${id}')"><i class="fas fa-trash"></i></button>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    allJobs = {};
                    list.innerHTML = '<p style="text-align:center; color:#64748b;">Немає доданих вакансій.</p>';
                }
            });
        }

        function saveJob(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = 'Збереження...';
            btn.disabled = true;

            const jobData = {
                status: document.getElementById('jobStatus').value,
                title: document.getElementById('jobTitle').value,
                country: document.getElementById('jobCountry').value,
                category: document.getElementById('jobCategory').value,
                age: document.getElementById('jobAge').value,
                minors: document.getElementById('jobMinors').checked ? 'Так' : 'Ні',
                gender: document.getElementById('jobGender').value === 'Будь-яка' ? '' : document.getElementById('jobGender').value,
                salary: document.getElementById('jobSalary').value,
                desc: document.getElementById('jobDesc').value,
                // Важливо: зберігаємо час створення для сортування (якщо редагуємо - залишаємо старий час)
                timestamp: (editingJobId && allJobs[editingJobId].timestamp) ? allJobs[editingJobId].timestamp : Date.now()
            };

            const url = editingJobId ? `${dbBase}/${editingJobId}.json` : `${dbBase}.json`;
            const method = editingJobId ? 'PUT' : 'POST';

            fetch(url, { method: method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(jobData) })
            .then(response => {
                if(response.ok) { alert('✅ Успішно збережено!'); cancelEdit(); loadAdminJobs(); switchTab('list'); }
            }).finally(() => { btn.innerHTML = 'Зберегти вакансію <i class="fas fa-save"></i>'; btn.disabled = false; });
        }

        function editJob(id) {
            editingJobId = id;
            const job = allJobs[id];
            
            document.getElementById('formTitle').innerText = 'Редагування вакансії';
            document.getElementById('tabAddBtn').innerHTML = '<i class="fas fa-pen"></i> Редагування';
            document.getElementById('cancelEditBtn').style.display = 'block';

            document.getElementById('jobStatus').value = job.status || 'Актуальна';
            document.getElementById('jobTitle').value = job.title;
            document.getElementById('jobCountry').value = job.country;
            document.getElementById('jobCategory').value = job.category;
            document.getElementById('jobAge').value = job.age || '';
            document.getElementById('jobMinors').checked = job.minors === 'Так';
            document.getElementById('jobGender').value = job.gender ? job.gender : 'Будь-яка';
            document.getElementById('jobSalary').value = job.salary;
            document.getElementById('jobDesc').value = job.desc;

            switchTab('add');
        }

        function cancelEdit() {
            editingJobId = null;
            document.getElementById('jobForm').reset();
            document.getElementById('jobStatus').value = 'Актуальна';
            document.getElementById('formTitle').innerText = 'Створення нової вакансії';
            document.getElementById('tabAddBtn').innerHTML = '<i class="fas fa-plus"></i> Додати вакансію';
            document.getElementById('cancelEditBtn').style.display = 'none';
        }

        function deleteJob(id) {
            if(confirm('Видалити назавжди?')) {
                fetch(`${dbBase}/${id}.json`, { method: 'DELETE' }).then(res => { if(res.ok) loadAdminJobs(); });
            }
        }
    </script>
</body>
</html>
