<aside class="sidebar" id="sidebar">
            <div class="sidebar-header" ondblclick="toggleSecretFilter()" title="Подвійний клік приховує таємницю..." style="cursor: pointer;">
                <h3><i class="fas fa-sliders-h"></i> Фільтри</h3>
                <button class="close-sidebar" onclick="toggleSidebar()">&times;</button>
            </div>

            <div class="filter-section" id="secretPartnerDiv" style="display: none; background: #fff1f2; padding: 10px; border-radius: 8px; border: 1px dashed #f43f5e;">
                <div class="filter-header">
                    <span style="color: #e11d48; font-weight: 700;"><i class="fas fa-user-secret"></i> Код партнера</span>
                </div>
                <div class="filter-body open">
                    <input type="text" id="partnerFilterInput" class="form-select" placeholder="Введіть код..." oninput="applyFilters()">
                </div>
            </div>

            <div class="filter-section">
                <div class="filter-header" onclick="toggleAccordion('statusAcc')">
                    <span>Актуальність</span> <i class="fas fa-chevron-down"></i>
                </div>
                <div class="filter-body open" id="statusAcc">
                    <select id="statusFilter" class="form-select" onchange="applyFilters()">
                        <option value="Всі">Всі вакансії</option>
                        <option value="Актуальна" selected>Тільки актуальні</option>
                        <option value="Неактуальна">Архів (Неактуальні)</option>
                    </select>
                </div>
            </div>

            <div class="filter-section">
                <div class="filter-header" onclick="toggleAccordion('countryAcc')">
                    <span>Країна</span> <i class="fas fa-chevron-down"></i>
                </div>
                <div class="filter-body open" id="countryAcc">
                    <div id="dynamicCountries"></div>
                </div>
            </div>

            <div class="filter-section">
                <div class="filter-header" onclick="toggleAccordion('cityAcc')">
                    <span>Місто / Регіон</span> <i class="fas fa-chevron-down"></i>
                </div>
                <div class="filter-body open" id="cityAcc">
                    <select id="cityFilter" class="form-select" onchange="applyFilters()">
                        <option value="Всі">Всі міста</option>
                        </select>
                </div>
            </div>

            <div class="filter-section">
                <div class="filter-header" onclick="toggleAccordion('radiusAcc')">
                    <span>Радіус від міста</span> <i class="fas fa-chevron-down"></i>
                </div>
                <div class="filter-body open" id="radiusAcc">
                    <select id="radiusFilter" class="form-select" onchange="applyFilters()">
                        <option value="Будь-який">Будь-яка відстань</option>
                        <option value="0">Точно в місті (0 км)</option>
                        <option value="10">До 10 км</option>
                        <option value="30">До 30 км</option>
                        <option value="50">До 50 км</option>
                    </select>
                </div>
            </div>

            <div class="filter-section">
                <div class="filter-header" onclick="toggleAccordion('categoryAcc')">
                    <span>Сфера роботи</span> <i class="fas fa-chevron-down"></i>
                </div>
                <div class="filter-body" id="categoryAcc">
                    <div id="dynamicCategories"></div>
                </div>
            </div>
